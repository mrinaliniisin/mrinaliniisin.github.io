<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page editor</title>
  <style>
    /* Local-only tool chrome — never deployed in a meaningful way (the /api
       endpoints only exist on the local save server). Mirrors editor.html. */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
    .bar { position: sticky; top: 0; z-index: 10; display: flex; gap: 12px;
           align-items: center; flex-wrap: wrap;
           background: #1a1a1a; color: #fff; padding: 12px 20px; }
    .bar select { font: inherit; border: 1px solid #444; border-radius: 6px;
                  background: #2a2a2a; color: #fff; padding: 7px 10px; max-width: 320px; }
    .bar button { font: inherit; background: #2d5a27; color: #fff; border: 0;
                  border-radius: 6px; padding: 8px 16px; font-weight: 600; cursor: pointer; }
    .bar button:hover { filter: brightness(1.12); }
    .bar .navlink { color: #8fd17f; text-decoration: none; font-size: 14px; }
    .bar .navlink:hover { text-decoration: underline; }
    .bar .status { font-size: 13px; color: #a8a29e; }
    .bar .status a { color: #8fd17f; }
    .bar code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                font-size: 0.92em; background: #2a2a2a; color: #e8e6e1;
                padding: 1px 6px; border-radius: 4px; }
    .panes { display: grid; grid-template-columns: 1fr 1fr; gap: 0;
             height: calc(100vh - 58px); }
    .panes textarea { border: 0; border-right: 1px solid #d9d6cf; padding: 24px;
                      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                      font-size: 13px; line-height: 1.55; resize: none; outline: none;
                      background: #fbfaf8; color: #1a1a1a; white-space: pre; tab-size: 2; }
    .preview { background: #fff; }
    .preview iframe { width: 100%; height: 100%; border: 0; display: block; }
    @media (max-width: 720px) { .panes { grid-template-columns: 1fr; height: auto; }
                                .panes textarea { min-height: 50vh; }
                                .preview iframe { min-height: 50vh; } }
  </style>
</head>
<body>
  <div class="bar">
    <select id="open" title="Open a standalone page to edit">
      <option value="">Open page…</option>
    </select>
    <button id="save">Save</button>
    <a class="navlink" href="/editor.html">Blog editor</a>
    <a class="navlink" href="/gallery.html">Images</a>
    <span class="status" id="status">Pick a page &middot; Save overwrites the file, then <code>git push</code> to publish</span>
  </div>
  <div class="panes">
    <textarea id="html" spellcheck="false" placeholder="Select a page above to edit its raw HTML…"></textarea>
    <div class="preview">
      <!-- allow-same-origin (no allow-scripts): the page renders with its own
           CSS and images, but its scripts (e.g. push.js) don't run on every
           keystroke. These pages are static layout, so JS isn't needed here. -->
      <iframe id="frame" title="Live preview" sandbox="allow-same-origin"></iframe>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    let current = '';     // path of the loaded page
    let dirty = false;

    // srcdoc has no URL of its own, so a page's relative assets (its stylesheet,
    // images) wouldn't resolve. Inject a <base> pointing at the page's real
    // directory on this server so the preview looks like the deployed page.
    function withBase(html, path) {
      const dir = '/' + path.replace(/[^/]*$/, '');     // drop the filename
      const base = '<base href="' + dir + '">';
      return /<head[^>]*>/i.test(html)
        ? html.replace(/<head[^>]*>/i, m => m + base)
        : base + html;
    }
    function render() {
      $('frame').srcdoc = withBase($('html').value, current || 'index.html');
    }

    // Populate the picker with the server's allowlist of standalone pages.
    fetch('/api/pages').then(r => r.json()).then(d => {
      for (const p of d.pages) {
        const o = document.createElement('option');
        o.value = p.path;
        o.textContent = p.title + ' · ' + p.path + (p.exists ? '' : ' (missing)');
        $('open').appendChild(o);
      }
      const cur = new URLSearchParams(location.search).get('p');
      if (cur) loadPage(cur);
    }).catch(() => { $('status').textContent = 'Could not reach the save server.'; });

    function loadPage(path) {
      return fetch('/api/page?p=' + encodeURIComponent(path))
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(p => {
          current = p.path;
          $('html').value = p.html;
          $('open').value = p.path;
          render(); dirty = false;
          $('status').textContent = 'Editing ' + p.path;
          history.replaceState(null, '', '?p=' + p.path);
        })
        .catch(() => { $('status').textContent = 'Could not load "' + path + '"'; });
    }

    $('open').addEventListener('change', () => {
      const p = $('open').value;
      if (!p) return;
      if (dirty && !confirm('Discard unsaved changes and open this page?')) {
        $('open').value = current; return;
      }
      loadPage(p);
    });

    $('html').addEventListener('input', () => { render(); dirty = true; });

    $('save').addEventListener('click', async () => {
      if (!current) { $('status').textContent = 'Pick a page first.'; return; }
      $('status').textContent = 'Saving…';
      try {
        const r = await fetch('/api/page/save', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path: current, html: $('html').value })
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || r.status);
        dirty = false;
        $('status').innerHTML = 'Saved &rarr; <a href="' + d.url + '" target="_blank">' +
                                d.url + '</a> &middot; now <code>git push</code>';
      } catch (e) { $('status').textContent = 'Error: ' + e.message; }
    });

    // Warn before navigating away from unsaved raw-HTML edits.
    window.addEventListener('beforeunload', e => {
      if (dirty) { e.preventDefault(); e.returnValue = ''; }
    });
  </script>
</body>
</html>
