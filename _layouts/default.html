<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} &middot; {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
           background: #f4f3f0; color: #1a1a1a; line-height: 1.6; padding: 64px 16px; }
    .wrap { max-width: 680px; margin: 0 auto; }

    /* Back link shown above page titles */
    .back { display: inline-block; margin-bottom: 24px; font-size: 14px;
            color: #6b6560; text-decoration: none; }
    .back:hover { color: #2d5a27; }

    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .post-meta { font-size: 13px; color: #a8a29e; margin-bottom: 32px; }

    /* Blog index listing */
    .post-list { list-style: none; }
    .post-list li { padding: 16px 0; border-bottom: 1px solid #e3e0d9; }
    .post-list li:last-child { border-bottom: none; }
    .post-list a { font-size: 18px; font-weight: 600; color: #1a1a1a;
                   text-decoration: none; }
    .post-list a:hover { color: #2d5a27; }
    .post-list .post-meta { display: block; margin: 4px 0 0;
                            font-size: 13px; color: #a8a29e; }

    /* Article body */
    .post-body { font-size: 16px; }
    .post-body p,
    .post-body ul,
    .post-body ol,
    .post-body blockquote,
    .post-body pre { margin: 0 0 18px; }
    .post-body ul, .post-body ol { padding-left: 24px; }
    .post-body h2 { font-size: 22px; margin: 32px 0 12px; }
    .post-body h3 { font-size: 18px; margin: 24px 0 8px; }
    .post-body a { color: #2d5a27; }
    .post-body blockquote { padding-left: 16px; border-left: 3px solid #d9d6cf;
                            color: #4a4540; }
    .post-body code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                      font-size: 0.9em; background: #ebe9e4; padding: 1px 5px;
                      border-radius: 4px; }
    .post-body pre { background: #ebe9e4; padding: 16px; border-radius: 8px;
                     overflow-x: auto; }
    .post-body pre code { background: none; padding: 0; }
    .post-body img { max-width: 100%; height: auto; border-radius: 8px; }

    footer { max-width: 680px; margin: 48px auto 0; font-size: 12px;
             color: #a8a29e; text-align: center; }
  </style>
</head>
<body>
  <div class="wrap">
    {{ content }}
  </div>
  <footer>&copy; 2026 Mrinalini S &middot; Code licensed under MIT</footer>
</body>
</html>
